<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazing Example Website</title>
  </head>
  <body>
    <script>
      (function () {
        var lang = (navigator.language || navigator.userLanguage).toLowerCase();
        if (lang.startsWith("pl")) {
          window.location.href = "/pl/";
        } else {
          window.location.href = "/en/";
        }
      })();
    </script>
    <noscript>
      <p>
        Please enable JavaScript to be redirected to the appropriate language
        version.
      </p>
      <a href="/en/">English Version</a> | <a href="/pl/">Polish Version</a>
    </noscript>
  </body>
</html>
